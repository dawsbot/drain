<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Drain preview</title>
  <desc id="desc">Drain is an open-source EVM wallet rescue and token migration tool.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D7FF45" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#8FBF20" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020608" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mercury" x1="155" y1="127" x2="1037" y2="542" gradientUnits="userSpaceOnUse">
