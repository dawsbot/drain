    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111A20" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#05080B" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="blur" x="-25%" y="-25%" width="150%" height="150%">
